<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Contact - Small Scale Studios</title>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Small Scale Studios</a>

        <!-- Mobile nav toggle -->
        <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation">
        ☰
        </label>

        <nav>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h2>Commission Request</h2>

            <p>
                Interested in bringing your miniatures to life?
                Submit your request below and we can discuss your project.
            </p>

            <p>
                Average response time: 24-48 hours
            </p>

            <form action="#" method="post">

                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Contact Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="commission-type">Commission Type:</label>
                    <select id="commission-type" name="commission-type" required>
                        <option value="">Select option</option>
                        <option value="painting">Painting</option>
                        <option value="assembly">Assembly</option>
                        <option value="painting-and-basing">Painting + Basing</option>
                        <option value="full-army">Full Army Project</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="game-system">Game System:</label>
                    <select id="game-system" name="game-system" required>
                        <option value="">Select a game system</option>
                        <option value="warhammer-40k">Warhammer 40,000</option>
                        <option value="age-of-sigmar">Age of Sigmar</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="project">Commission Details:</label>
                    <textarea id="project" name="project" rows="3"
                    placeholder="Tell me about your models, army, colour scheme, or ideas..."
                    required></textarea>
                </div>

                <div class="form-group">
                    <label for="number-of-miniatures">Number of Miniatures:</label>
                    <input type="number" id="number-of-miniatures" 
                    name="number-of-miniatures" min="1" required>
                </div>

                <div class="form-group">
                    <label for="deadline">Desired Completion Date:</label>
                    <input type="date" id="deadline" name="deadline"
                    placeholder="Optional">
                </div>

                <button type="submit" class="btn btn-primary">
                    Submit Request
                </button>

            </form>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Small Scale Studios. All rights reserved.</p>
        </div>
    </footer>

<script src="assets/js/script.js"></script>

</body>
</html>
