<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Contact - Miniature Commissions</title>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Miniature Commissions</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="pricing.html">Pricing</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h2>Contact Me</h2>
            <p>Have questions or want to discuss a commission? Get in touch!</p>
            <p>Average response time: 24-48 hours</p>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="game-system">Game System:</label>
                    <select id="game-system" name="game-system" required>
                        <option value="">Select a game system</option>
                        <option value="warhammer-40k">Warhammer 40k</option>
                        <option value="age-of-sigmar">Age of Sigmar</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="number-of-miniatures">Number of Miniatures:</label>
                    <input type="number" id="number-of-miniatures" name="number-of-miniatures" min="1" required>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Miniature Commissions. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
